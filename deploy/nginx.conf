# Configuració Nginx per al Centre de Control
# Copia-ho a: /etc/nginx/sites-available/control-center
# i activa-ho: sudo ln -s /etc/nginx/sites-available/control-center /etc/nginx/sites-enabled/
#
# IMPORTANT: substitueix EL_TEU_DOMINI pel teu domini real.
# Certbot (sudo certbot --nginx -d EL_TEU_DOMINI) afegirà automàticament
# el bloc HTTPS i la redirecció des del port 80.

server {
    listen 80;
    listen [::]:80;
    server_name EL_TEU_DOMINI;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
