<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Centre de Control</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="topbar">
    <h1 id="topbar-title">Centre de Control</h1>
    <button id="logout-btn" class="btn-ghost" title="Tanca la sessió">Surt</button>
  </header>

  <main class="dashboard">
    <!-- MEROSS -->
    <div class="page" id="page-meross">
      <section class="card" id="meross-card">
        <div class="card-header">
          <h2>🔌 Endolls</h2>
          <span class="badge" id="meross-badge">…</span>
        </div>
        <div id="meross-devices" class="device-list">
          <p class="muted">Carregant dispositius…</p>
        </div>
      </section>
    </div>

    <!-- TUYA / CALEFACCIÓ -->
    <div class="page" id="page-tuya">
      <section class="card" id="tuya-card">
        <div class="card-header">
          <h2>🔥 Calefacció</h2>
          <span class="badge" id="tuya-badge">…</span>
        </div>
        <div id="tuya-body">
          <p class="muted">Carregant…</p>
        </div>
      </section>
    </div>

    <!-- ROOMBA -->
    <div class="page" id="page-roomba">
      <section class="card" id="roomba-card">
        <div class="card-header">
          <h2>🤖 Roomba</h2>
          <span class="badge" id="roomba-badge">…</span>
        </div>
        <div id="roomba-body">
          <p class="muted">Carregant…</p>
        </div>
      </section>
    </div>

    <!-- SPOTIFY -->
    <div class="page" id="page-spotify">
      <section class="card" id="spotify-card">
        <div class="card-header">
          <h2>🎵 Spotify</h2>
          <span class="badge" id="spotify-badge">…</span>
        </div>
        <div id="spotify-body">
          <p class="muted">Carregant…</p>
        </div>
      </section>
    </div>

    <!-- LLISTA DE LA COMPRA -->
    <div class="page" id="page-shopping">
      <section class="card" id="shopping-card">
        <div class="card-header">
          <h2>🛒 Llista de la compra</h2>
          <button id="shop-clear" class="btn-small hidden">Neteja comprats</button>
        </div>
        <form id="shop-form" class="shop-form">
          <input type="text" id="shop-input" placeholder="Afegeix un producte…" maxlength="200" autocomplete="off">
          <button type="submit" class="btn-small">Afegeix</button>
        </form>
        <div id="shop-list" class="shop-list">
          <p class="muted">Carregant…</p>
        </div>
      </section>
    </div>

    <!-- XARXA (TP-LINK DECO) -->
    <div class="page" id="page-deco">
      <section class="card" id="deco-card">
        <div class="card-header">
          <h2>📶 Xarxa</h2>
          <span class="badge" id="deco-badge">…</span>
        </div>
        <div id="deco-body">
          <p class="muted">Carregant…</p>
        </div>
      </section>
    </div>

    <!-- DISCORD -->
    <div class="page" id="page-discord">
      <section class="card" id="discord-card">
        <div class="card-header">
          <h2>💬 Discord</h2>
          <span class="badge" id="discord-badge">…</span>
        </div>
        <div id="discord-body">
          <p class="muted">Carregant…</p>
        </div>
      </section>
    </div>
  </main>

  <nav class="tabbar" id="tabbar">
    <button class="tab-btn" data-tab="meross" data-title="Endolls"><span class="tab-icon">🔌</span><span class="tab-label">Endolls</span></button>
    <button class="tab-btn" data-tab="tuya" data-title="Calefacció"><span class="tab-icon">🔥</span><span class="tab-label">Calor</span></button>
    <button class="tab-btn" data-tab="roomba" data-title="Roomba"><span class="tab-icon">🤖</span><span class="tab-label">Roomba</span></button>
    <button class="tab-btn" data-tab="spotify" data-title="Spotify"><span class="tab-icon">🎵</span><span class="tab-label">Música</span></button>
    <button class="tab-btn" data-tab="shopping" data-title="Llista de la compra"><span class="tab-icon">🛒</span><span class="tab-label">Compra</span></button>
    <button class="tab-btn" data-tab="deco" data-title="Xarxa"><span class="tab-icon">📶</span><span class="tab-label">Xarxa</span></button>
    <button class="tab-btn" data-tab="discord" data-title="Discord"><span class="tab-icon">💬</span><span class="tab-label">Discord</span></button>
  </nav>

  <script src="/js/app.js"></script>
</body>
</html>
